<!DOCTYPE html>
<html>
<head>
  <title>Wallet - Login</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="./sources/styles.css">

  <style>
    body {
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="container card p-4">
    <h2>Ingreso a Wallet</h2>
    <form id="ingreso">
      <div class="form-group">
        <label for="rut">Usuario:</label>
        <input type="text" class="form-control" id="rut" placeholder="Ingrese su usuario..." required>
      </div>
      <div class="form-group">
        <label for="pass">Contraseña:</label>
        <input type="password" class="form-control" id="pass" placeholder="Ingrese su contraseña..." required>
      </div>
      <button type="submit" class="btn btn-primary">Entrar</button>
    </form>
    <div class="alert alert-danger mt-3" id="miAlerta" style="display:none;">
      ¡Usuario o contraseña incorrectos!
    </div>

  </div>
  <script src="https://code.jquery.com/jquery-3.2.1.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.js"></script>
  <script src="./sources/index.js"></script>

</body>
</html>
